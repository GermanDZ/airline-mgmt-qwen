name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    name: Backend Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest-asyncio httpx coverage

      - name: Run ruff linter
        working-directory: backend
        run: ruff check app/ || true  # non-blocking until rules are finalized

      - name: Type-check with MyPy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports 2>&1 || true  # lenient until types mature

  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ams
          POSTGRES_PASSWORD: ams_password
          POSTGRES_DB: ams_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ams"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx coverage

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short -v
        env:
          DATABASE_URL: postgresql+asyncpg://ams:ams_password@localhost:5432/ams_test
          SECRET_KEY: test-secret-for-ci-only-do-not-use-in-production
          DEBUG: "true"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/.coverage

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Run vitest
        working-directory: frontend
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e "."

      - name: Verify backend module structure
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ams:ams_password@localhost:5432/test
          SECRET_KEY: verify-deployment
        run: |
          python -c "from app.main import app; print('FastAPI app loads OK')" \
            && echo "Backend structure verified"

  docker-build:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (dev)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: development
          push: false
          tags: airline-mgmt-backend:${{ github.sha }}

      - name: Build frontend image (builder)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: builder
          push: false
          tags: airline-mgmt-frontend:${{ github.sha }}
