# Local development environment — PostgreSQL + Redis + Backend + Frontend
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose up -d backend       # just backend
#   docker compose down                # stop everything

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams_password
      POSTGRES_DB: ams_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      target: development
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ams:ams_password@postgres:5432/ams_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    volumes:
      - ./backend/app:/app/app  # live reload for source changes
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      target: production
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8000

volumes:
  pgdata:
  redisdata:
